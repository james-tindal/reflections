<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoken Reflection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <img src="curriculum-image-display.jpg" alt="Reflection" class="hero-image">
    
    <p class="description">
      Record a short spoken reflection under 1 minute
    </p>
    
    <button id="recordBtn" class="btn btn-primary">Start Recording</button>
    
    <p id="statusText" class="status"></p>
    
    <div id="loadingIndicator" class="loading" style="display: none;">
      <div class="spinner"></div>
      <span>Processing...</span>
    </div>
    
    <div id="transcriptSection" class="transcript-section" style="display: none;">
      <h2>Transcript</h2>
      <p id="transcriptText" class="transcript"></p>
    </div>
    
    <div class="actions">
      <a id="downloadBtn" class="btn btn-secondary" style="display: none;" download>Download Audio</a>
      <button id="shareBtn" class="btn btn-secondary" style="display: none;">Share Recording</button>
      <a id="submitBtn" class="btn btn-primary" style="display: none;" target="_blank">Submit Transcript</a>
    </div>
    
    <div id="sharedUrlSection" class="shared-url-section" style="display: none;">
      <p id="sharedUrlText" class="shared-url"></p>
      <button id="copyBtn" class="btn btn-secondary btn-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>
    </div>
  </main>
  
  <script type="module" src="src/index.ts"></script>
</body>
</html>
